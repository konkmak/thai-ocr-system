<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-Speed Web OCR System</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col justify-between">

    <header class="bg-white shadow-sm border-b border-gray-200 py-4 px-6">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <h1 class="text-xl font-bold text-gray-900 tracking-tight flex items-center gap-2">
                ⚡ High-Speed TH/EN OCR
            </h1>
            <span id="engine-status-badge" class="text-xs bg-amber-100 text-amber-800 font-medium px-2.5 py-0.5 rounded-full">Initializing Engine...</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto w-full p-6 grid grid-cols-1 md:grid-cols-2 gap-6 flex-grow">
        
        <section class="flex flex-col gap-4">
            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-200">
                <h2 class="text-lg font-semibold mb-4 text-gray-700">1. อัปโหลดรูปภาพเอกสาร / Upload Image</h2>
                
                <label class="flex flex-col items-center justify-center w-full h-48 border-2 border-gray-300 border-dashed rounded-lg cursor-pointer bg-gray-50 hover:bg-gray-100 transition-colors">
                    <div class="flex flex-col items-center justify-center pt-5 pb-6 text-center px-4">
                        <svg class="w-10 h-10 mb-3 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                        <p class="mb-2 text-sm text-gray-500"><span class="font-semibold">คลิกเพื่ออัปโหลด</span> หรือลากไฟล์มาวางที่นี่</p>
                        <p class="text-xs text-gray-400">PNG, JPG, or WEBP</p>
                    </div>
                    <input id="image-input" type="file" accept="image/*" class="hidden" disabled />
                </label>
            </div>

            <div class="bg-white p-4 rounded-xl shadow-xs border border-gray-200 flex-grow flex flex-col">
                <h3 class="text-sm font-semibold mb-2 text-gray-500">ตัวอย่างรูปภาพ / Image Preview</h3>
                <div class="flex-grow border border-gray-100 bg-gray-100 rounded-lg flex items-center justify-center overflow-hidden min-h-[200px]">
                    <img id="image-preview" class="max-h-64 object-contain hidden" alt="Uploaded Document Preview">
                    <span id="preview-placeholder" class="text-sm text-gray-400">ยังไม่มีรูปภาพที่เลือก</span>
                </div>
            </div>
        </section>

        <section class="flex flex-col gap-4">
            <div class="bg-white p-6 rounded-xl shadow-xs border border-gray-200 flex-grow flex flex-col">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-lg font-semibold text-gray-700">2. ข้อความที่คัดลอกได้ / Extracted Text</h2>
                    <button id="copy-btn" class="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-3 py-1.5 rounded-lg font-medium transition-colors hidden">
                        คัดลอกข้อความ (Copy)
                    </button>
                </div>

                <div id="status-container" class="mb-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                    <div class="flex items-center justify-between mb-2">
                        <span id="status-text" class="text-sm font-medium text-blue-700">กำลังดาวน์โหลดบอร์ดสแกนหลัก...</span>
                        <span id="progress-percentage" class="text-sm font-bold text-blue-700">0%</span>
                    </div>
                    <div class="w-full bg-blue-200 rounded-full h-2.5">
                        <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full transition-all duration-200" style="width: 0%"></div>
                    </div>
                </div>

                <div class="flex-grow flex flex-col">
                    <textarea id="output-text" readonly 
                        class="w-full flex-grow p-4 bg-gray-50 border border-gray-200 rounded-lg resize-none text-sm font-sans focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 placeholder-gray-400 min-h-[300px]"
                        placeholder="ระบบกำลังอุ่นเครื่องโมเดลภาษา... เมื่อเสร็จแล้วคุณจะสามารถอัปโหลดภาพสแกนได้ทันที"></textarea>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-white text-center py-4 text-xs text-gray-400 border-t border-gray-100">
        Engine Optimized with Persistent Web Worker Memory Leases
    </footer>

    <script>
        const imageInput = document.getElementById('image-input');
        const imagePreview = document.getElementById('image-preview');
        const previewPlaceholder = document.getElementById('preview-placeholder');
        const outputText = document.getElementById('output-text');
        const statusContainer = document.getElementById('status-container');
        const statusText = document.getElementById('status-text');
        const progressBar = document.getElementById('progress-bar');
        const progressPercentage = document.getElementById('progress-percentage');
        const copyBtn = document.getElementById('copy-btn');
        const badge = document.getElementById('engine-status-badge');

        let ocrWorker = null;

        const statusTranslations = {
            'loading tesseract core': 'กำลังโหลดโครงสร้างระบบ...',
            'initializing tesseract': 'กำลังเปิดใช้งานฮาร์ดแวร์เร่งความเร็ว...',
            'loading language traineddata': 'กำลังโหลดหน่วยความจำภาษา (ไทย/อังกฤษ)...',
            'initializing api': 'พร้อมใช้งานแล้ว!',
            'recognizing text': 'กำลังสแกนตัวอักษรอย่างรวดเร็ว...'
        };

        // 1. SAFE PRE-WARM ENGINE PIPELINE (Tesseract.js v5 Compliant)
        async function initEngine() {
            try {
                // Instantiating background pipeline layout safely
                ocrWorker = await Tesseract.createWorker({
                    logger: message => {
                        const messageStr = message.status;
                        if (messageStr === 'loading language traineddata' || messageStr === 'loading tesseract core' || messageStr === 'initializing tesseract') {
                            updateProgress(statusTranslations[messageStr] || messageStr, message.progress || 0);
                        }
                    }
                });

                // Explicitly loading matching datasets in distinct sequential promises
                await ocrWorker.loadLanguage('tha+eng');
                await ocrWorker.initialize('tha+eng');

                // Update system components to activate the frontend UI interactions
                badge.textContent = "Ready / พร้อมใช้งาน";
                badge.classList.replace('bg-amber-100', 'bg-green-100');
                badge.classList.replace('text-amber-800', 'text-green-800');
                
                statusContainer.classList.add('hidden');
                imageInput.removeAttribute('disabled');
                outputText.placeholder = "พร้อมแล้ว! วางหรืออัปโหลดรูปภาพเพื่อสแกนทันที...";
            } catch (err) {
                console.error("Initialization failed", err);
                statusText.textContent = "การโหลดเครื่องยนต์ล้มเหลว: " + err.message;
            }
        }

        // Run engine initialization immediately when the webpage displays
        initEngine();

        // 2. FILE SELECTION EVENT
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                imagePreview.src = event.target.result;
                imagePreview.classList.remove('hidden');
                previewPlaceholder.classList.add('hidden');
                
                // Process utilizing the warm, active memory worker thread
                processOCRFast(event.target.result);
            };
            reader.readAsDataURL(file);
        });

        // 3. RAPID OCR PROCESSOR 
        async function processOCRFast(imageSrc) {
            outputText.value = "";
            copyBtn.classList.add('hidden');
            statusContainer.classList.remove('hidden');
            updateProgress('กำลังดึงข้อมูลพิกเซล...', 0);

            try {
                // Target recognition pipeline instantly with precompiled caches
                const { data: { text } } = await ocrWorker.recognize(imageSrc, {}, {
                    logger: message => {
                        if (message.status === 'recognizing text') {
                            updateProgress(statusTranslations[message.status], message.progress);
                        }
                    }
                });

                if (text && text.trim().length > 0) {
                    outputText.value = text;
                    copyBtn.classList.remove('hidden');
                } else {
                    outputText.value = "ไม่พบตัวอักษรในรูปภาพนี้";
                }
            } catch (error) {
                console.error("OCR Execution Error:", error);
                outputText.value = `เกิดข้อผิดพลาด: ${error.message}`;
            } finally {
                statusContainer.classList.add('hidden');
            }
        }

        function updateProgress(statusMessage, progressFraction) {
            const percent = Math.round(progressFraction * 100);
            statusText.textContent = statusMessage;
            progressBar.style.width = `${percent}%`;
            progressPercentage.textContent = `${percent}%`;
        }

        // Copy functionality
        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(outputText.value).then(() => {
                const prev = copyBtn.textContent;
                copyBtn.textContent = "คัดลอกแล้ว! ✓";
                setTimeout(() => copyBtn.textContent = prev, 2000);
            });
        });
    </script>
</body>
</html>
